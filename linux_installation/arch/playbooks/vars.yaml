amdgpu_fix: false
auto_start_app: false
boot_mode: "bios"
boot_partition: ""
custom_firefox_icon: false
desktop_name: cinnamon
desktop: false
device_name: /dev/xxx 
efi_partition: "" # this is initiated blank
enable_endeavour: false
faillock_increase: true
faillock_retries: 6
filesystem_type: "xfs"
flatpak: false
fstab_directories: []
fstab_entries: []
gaming_platform: false
install_qemu_guest_agent: true  # Install QEMU guest agent for VM environments
install_rustdesk: false
journald_on_zfs: false
libvirt: false
luks_passphrase: "" # FILL ME
luks_volume_name: "cryptroot"
network_pacman_cache: true
nfs_path: '{{ remote_server }}:/storage/backups/pacman_cache'
nvidia_dkms: false
nvidia_lts: false
nvidia_open: false
old_pacman_version: false
remote_server: 192.168.8.95
restore_firefox_backup: false
restore_user_cryptography: false
sudoers_suspend_no_passwd: false

# SSH Key Setup (Optional)
add_ssh_key: false                          # Enable/disable SSH key feature
ssh_key_source: "string"                    # Method: "string", "file", or "url"
ssh_public_key: ""                          # SSH public key as string (if source: "string")
ssh_key_file_path: ""                       # Path to local key file (if source: "file")
ssh_key_url: ""                             # URL to download key from (if source: "url")
touchpad_fix: false
update_fstab: false
use_archzfs_repo: false
use_custom_repo: false
use_luks: false
use_zfs: false
username: 'stratus' # FILL ME
user_password: '' # FILL ME
zfs_partition: "" # this is initiated blank
zfs_partition_names:
    - mountpoint: "/"
      name: "zroot/ROOT/default"
      canmount: "noauto"
    - mountpoint: "/home"
      name: "zroot/data/home"
    - mountpoint: "none"
      name: "zroot/ROOT"
    - mountpoint: "none"
      name: "zroot/data"  
zfs_root_dataset: "zroot"
