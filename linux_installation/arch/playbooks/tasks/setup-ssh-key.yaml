---
- name: Add SSH key from string variable
  block:
    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ username }}/.ssh"
        state: directory
        mode: '0700'
        owner: "{{ username }}"
        group: "{{ username }}"

    - name: Add SSH key to authorized_keys
      ansible.builtin.lineinfile:
        path: "/home/{{ username }}/.ssh/authorized_keys"
        line: "{{ ssh_public_key }}"
        create: true
        mode: '0600'
        owner: "{{ username }}"
        group: "{{ username }}"
        state: present
  when:
    - add_ssh_key | bool
    - ssh_key_source == "string"
    - ssh_public_key | length > 0

- name: Add SSH key from local file
  block:
    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ username }}/.ssh"
        state: directory
        mode: '0700'
        owner: "{{ username }}"
        group: "{{ username }}"

    - name: Copy SSH key from file to authorized_keys
      ansible.builtin.copy:
        src: "{{ ssh_key_file_path }}"
        dest: "/home/{{ username }}/.ssh/authorized_keys"
        remote_src: true
        mode: '0600'
        owner: "{{ username }}"
        group: "{{ username }}"
  when:
    - add_ssh_key | bool
    - ssh_key_source == "file"
    - ssh_key_file_path | length > 0

- name: Add SSH key from URL
  block:
    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ username }}/.ssh"
        state: directory
        mode: '0700'
        owner: "{{ username }}"
        group: "{{ username }}"

    - name: Download SSH key from URL
      ansible.builtin.get_url:
        url: "{{ ssh_key_url }}"
        dest: "/home/{{ username }}/.ssh/authorized_keys"
        mode: '0600'
        owner: "{{ username }}"
        group: "{{ username }}"
  when:
    - add_ssh_key | bool
    - ssh_key_source == "url"
    - ssh_key_url | length > 0
