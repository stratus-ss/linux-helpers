---
- name: Configure ZFS on Arch Linux
  hosts: localhost
  become: true
  vars_files:
    - ../vars.yaml

  tasks:
    - name: Fail if device_name is not specified
      fail:
        msg: "Please specify the device_name variable (e.g., -e device_name=/dev/sda)"
      when: device_name == '/dev/xxx'

    - name: Fail if ZFS is used with BIOS mode
      fail:
        msg: "ZFS with ZFSBootMenu requires UEFI boot mode. Set boot_mode: 'uefi' or use_zfs: false"
      when:
        - use_zfs | default(false) | bool
        - boot_mode == "bios"

    - name: Check for ZFS support when ZFS is required
      block:
        - name: Check if ZFS kernel module is available
          ansible.builtin.command: modinfo zfs
          register: zfs_module_check
          failed_when: false
          changed_when: false

        - name: Check if zfs command exists
          ansible.builtin.command: which zfs
          register: zfs_command_check
          failed_when: false
          changed_when: false

        - name: Fail with helpful message if ZFS is not available
          fail:
            msg: |
              ╔════════════════════════════════════════════════════════════════════════════╗
              ║                    ZFS NOT AVAILABLE IN CURRENT ISO                        ║
              ╚════════════════════════════════════════════════════════════════════════════╝
              
              You are attempting to install Arch Linux with ZFS on root, but the current
              ISO does not have ZFS support built-in.
              
              REQUIRED: Boot from an ArchZFS ISO
              
              Download the latest ArchZFS ISO from:
              → https://github.com/r-maerz/archlinux-lts-zfs/releases
              
              ALTERNATIVE OPTIONS:
              1. Set 'use_zfs: false' in vars.yaml to use a traditional filesystem
                 (ext4, xfs, btrfs, or bcachefs) with GRUB bootloader
              
              2. Use the standard Arch ISO and manually install ZFS (not recommended)
              
              ═══════════════════════════════════════════════════════════════════════════
              Current kernel: {{ ansible_kernel }}
              ZFS module available: {{ zfs_module_check.rc == 0 }}
              ZFS command available: {{ zfs_command_check.rc == 0 }}
              ═══════════════════════════════════════════════════════════════════════════
          when:
            - zfs_module_check.rc != 0
            - zfs_command_check.rc != 0

        - name: Display ZFS availability confirmation
          ansible.builtin.debug:
            msg: |
              ✓ ZFS is available in this ISO
              Kernel: {{ ansible_kernel }}
              ZFS module: Present
          when:
            - zfs_module_check.rc == 0 or zfs_command_check.rc == 0

        - name: Load ZFS module if not already loaded
          community.general.modprobe:
            name: zfs
            state: present
          when: zfs_module_check.rc == 0

      when: 
        - use_zfs | default(true) | bool

    - name: Set partition variables for UEFI
      set_fact:
        boot_partition: "{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}1"
        zfs_partition: >-
          {% if use_luks | bool %}
          /dev/mapper/{{ luks_volume_name }}
          {% else %}
          {{ device_name }}{% if 'nvme' in device_name %}p{% endif %}2
          {% endif %}
        root_partition: "{% if use_luks | bool %}/dev/mapper/{{ luks_volume_name }}{% else %}{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}2{% endif %}"
        luks_partition: "{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}2"
      when: boot_mode == "uefi"

    - name: Set partition variables for BIOS
      set_fact:
        bios_boot_partition: "{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}1"
        boot_partition: "{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}2"
        zfs_partition: >-
          {% if use_luks | bool %}
          /dev/mapper/{{ luks_volume_name }}
          {% else %}
          {{ device_name }}{% if 'nvme' in device_name %}p{% endif %}3
          {% endif %}
        root_partition: "{% if use_luks | bool %}/dev/mapper/{{ luks_volume_name }}{% else %}{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}3{% endif %}"
        luks_partition: "{{ device_name }}{% if 'nvme' in device_name %}p{% endif %}3"
      when: boot_mode == "bios" 


    - name: Zap all partitions on disk
      command: sgdisk --zap-all {{ device_name }}

    # UEFI partitioning scheme
    - name: Create EFI boot partition (UEFI)
      command: sgdisk -n1:1M:+512M -t1:EF00 {{ device_name }}
      when: boot_mode == "uefi"

    - name: Create data partition for ZFS (UEFI)
      command: sgdisk -n2:0:0 -t2:BF00 {{ device_name }}
      when:
        - boot_mode == "uefi"
        - use_zfs | default(true) | bool

    - name: Create data partition for root filesystem (UEFI)
      command: sgdisk -n2:0:0 -t2:8300 {{ device_name }}
      when:
        - boot_mode == "uefi"
        - not use_zfs | default(false) | bool

    # BIOS partitioning scheme
    - name: Create BIOS boot partition (BIOS)
      command: sgdisk -n1:1M:+2M -t1:EF02 {{ device_name }}
      when: boot_mode == "bios"

    - name: Create boot partition (BIOS)
      command: sgdisk -n2:0:+512M -t2:8300 {{ device_name }}
      when: boot_mode == "bios"

    - name: Create data partition for ZFS (BIOS)
      command: sgdisk -n3:0:0 -t3:BF00 {{ device_name }}
      when:
        - boot_mode == "bios"
        - use_zfs | default(true) | bool

    - name: Create data partition for root filesystem (BIOS)
      command: sgdisk -n3:0:0 -t3:8300 {{ device_name }}
      when:
        - boot_mode == "bios"
        - not use_zfs | default(false) | bool

    - name: Run partprobe
      command: partprobe {{ device_name }}

    - name: Format boot partition as FAT32
      filesystem:
        fstype: vfat
        dev: "{{ boot_partition }}"
        opts: "-F 32 -n BOOT"
        force: true

    - name: (Create and) open the LUKS container; name it {{ luks_volume_name }}
      community.crypto.luks_device:
        device: "{{ luks_partition }}"
        state: "opened"
        name: "{{ luks_volume_name }}"
        passphrase: "{{ luks_passphrase }}"
      when: use_luks | default(false) | bool

    - name: Setup ZFS pool and datasets
      include_tasks: pre-installation_zfs_setup.yaml
      when: use_zfs | default(true) | bool

    - name: Setup in-kernel filesystem (ext4, xfs, btrfs)
      include_tasks: pre-installation_in_kernel_fs.yaml
      when:
        - not use_zfs | default(false) | bool
        - filesystem_type in ['ext4', 'xfs', 'btrfs']

    - name: Setup bcachefs filesystem
      include_tasks: pre-installation_bcachefs.yaml
      when:
        - not use_zfs | default(false) | bool
        - filesystem_type == 'bcachefs'

    - name: Create boot mount directory (UEFI)
      file:
        path: /mnt/boot/EFI
        state: directory
      when: boot_mode == "uefi"

    - name: Create boot mount directory (BIOS)
      file:
        path: /mnt/boot
        state: directory
      when: boot_mode == "bios"

    - name: Run partprobe
      command: partprobe {{ device_name }}

    - name: Mount EFI partition
      mount:
        path: /mnt/boot/EFI
        src: "{{ boot_partition }}"
        fstype: vfat
        state: mounted
      when: boot_mode == "uefi"

    - name: Mount boot partition (BIOS)
      mount:
        path: /mnt/boot
        src: "{{ boot_partition }}"
        fstype: vfat
        state: mounted
      when: boot_mode == "bios"

    - name: Remount NFS share
      mount:
        path: /var/cache/pacman/pkg
        src: "{{ nfs_path }}"
        fstype: nfs
        state: mounted
      when:
        - network_pacman_cache | bool

    - name: Add custom repository to pacman.conf
      ansible.builtin.blockinfile:
        path: /etc/pacman.conf
        insertbefore: '^\[core\]'
        block: |
          [custom]
          SigLevel = Optional TrustAll
          Server = file:///var/cache/pacman/pkg
        marker: "# {mark} ANSIBLE MANAGED BLOCK FOR CUSTOM REPO"
      when: use_custom_repo| default(false) | bool


    - name: Install base system
      command: pacstrap /mnt linux-lts base base-devel intel-ucode nano nfs-utils ansible python-passlib

    - name: Generate fstab
      shell: genfstab -U /mnt |grep -v nfs >> /mnt/etc/fstab

    - name: Update the mirrorlist
      shell: reflector > /mnt/etc/pacman.d/mirrorlist
      
    - name: Copy playbook files to /mnt/mnt
      ansible.builtin.copy:
        src: /root/playbooks/
        dest: /mnt/mnt
        owner: root
        group: root
        mode: '0644'